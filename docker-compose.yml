services:
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./app/frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./application/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/peak_haunt}
    volumes:
      - ./application/backend:/usr/src/app
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg16
    container_name: peak_haunt_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-peak_haunt}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./application/backend/src/database/sql/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

volumes:
  pgdata:
